name: CI

on: [push]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13t", "3.14t"]
    name: Run tests. OS ${{ matrix.os }}. Python ${{ matrix.python-version }}.
    steps:
      - name: Checkout Source
        uses: actions/checkout@v6
      - name: Install the latest version of uv and set the python version
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: |
          cd djangotutorial
          uv venv
          uv pip install -r pyproject.toml --all-extras
          uv run ruff check
          uv run ruff format --check
          uv run python manage.py test --parallel
          uv run coverage run --source='.' manage.py test
          uv run coverage report

  workflow-telemetry-action:
    runs-on: ubuntu-latest
    steps:
      - name: Collect Workflow Telemetry
        uses: ycfreeman/workflow-telemetry-action@v3.0.2
      - name: Checkout Source
        uses: actions/checkout@v6
      - name: Run wrk
        run: |
          cd djangotutorial
          docker compose up -d
          until curl -s --fail http://0.0.0.0:8000/placeholder_api/comments_list; do
            echo "Ждём запуска сервиса..."
            sleep 2
          done
          echo "Конечная точка доступна!"
          sudo apt install wrk
          wrk -c 100 -t 4 -d 30 http://0.0.0.0:8000/placeholder_api/comments_list
